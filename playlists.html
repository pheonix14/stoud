<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stoud v2 - Playlist Builder</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="bg-glow"></div>
    <div class="bg-glow-secondary"></div>

    <!-- Sidebar Navigation -->
    <div class="sidebar">
        <div class="logo-container">
            <div class="logo-icon">
                <svg viewBox="0 0 24 24">
                    <polygon points="23 7 16 12 23 17 23 7"></polygon>
                    <rect x="1" y="5" width="15" height="14" rx="2" ry="2"></rect>
                </svg>
            </div>
            <div class="logo-text">Stoud v2</div>
        </div>
        <ul class="nav-menu">
            <li class="nav-item">
                <a href="/">
                    <svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="9"></rect><rect x="14" y="3" width="7" height="5"></rect><rect x="14" y="12" width="7" height="9"></rect><rect x="3" y="16" width="7" height="5"></rect></svg>
                    Dashboard
                </a>
            </li>
            <li class="nav-item">
                <a href="/scheduled">
                    <svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg>
                    Schedules
                </a>
            </li>
            <li class="nav-item active">
                <a href="/playlists">
                    <svg viewBox="0 0 24 24"><line x1="8" y1="6" x2="21" y2="6"></line><line x1="8" y1="12" x2="21" y2="12"></line><line x1="8" y1="18" x2="21" y2="18"></line><line x1="3" y1="6" x2="3.01" y2="6"></line><line x1="3" y1="12" x2="3.01" y2="12"></line><line x1="3" y1="18" x2="3.01" y2="18"></line></svg>
                    Playlists
                </a>
            </li>
            <li class="nav-item">
                <a href="/saved">
                    <svg viewBox="0 0 24 24"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"></path></svg>
                    Library
                </a>
            </li>
            <li class="nav-item">
                <a href="/settings">
                    <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
                    Settings
                </a>
            </li>
        </ul>
        <div class="sidebar-footer">
            Stoud v2.0.0
        </div>
    </div>

    <!-- Main Content Area -->
    <div class="content-wrapper">
        <div class="header">
            <div class="page-title">
                <h1>Playlists Manager</h1>
                <p>Combine multiple streams together into sequentially playing queues.</p>
            </div>
            <button class="btn btn-primary" onclick="openPlaylistModal()">
                <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
                Create Playlist
            </button>
        </div>

        <!-- Playlist Grid View -->
        <div class="grid" id="playlists-grid">
            <!-- Dynamic listing -->
            <div style="grid-column: 1/-1; text-align: center; color: var(--text-secondary); padding: 3rem;">
                Loading playlist libraries...
            </div>
        </div>
    </div>

    <!-- Edit/Add Playlist Modal -->
    <div class="modal" id="playlist-modal">
        <div class="modal-content" style="max-width: 750px;">
            <div class="modal-header">
                <h2 id="modal-title">Create Playlist</h2>
                <button class="modal-close" onclick="closePlaylistModal()">&times;</button>
            </div>
            <div style="display: flex; flex-direction: column; gap: 1rem;">
                <input type="hidden" id="playlist-id">
                
                <div class="form-group">
                    <label for="playlist-name">Playlist Name / Label</label>
                    <input type="text" id="playlist-name" class="form-control" placeholder="e.g. Movie Marathon Series">
                </div>

                <div class="form-group">
                    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.5rem;">
                        <label>Playlist Items Queue</label>
                        <button class="btn btn-secondary btn-sm" onclick="addPlaylistItemRow()">
                            <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
                            Add Video Row
                        </button>
                    </div>
                    
                    <div style="max-height: 300px; overflow-y: auto; border: 1px solid var(--glass-border); border-radius: 10px; background: rgba(0,0,0,0.25);">
                        <table class="data-table" style="margin-top: 0;">
                            <thead>
                                <tr>
                                    <th style="width: 35%">Item Title</th>
                                    <th style="width: 45%">Video Link (YT / GDrive)</th>
                                    <th style="width: 20%; text-align: center;">Controls</th>
                                </tr>
                            </thead>
                            <tbody id="playlist-items-tbody">
                                <!-- Appended rows -->
                            </tbody>
                        </table>
                    </div>
                </div>

                <div class="form-row" style="margin-top: 1rem;">
                    <button class="btn btn-secondary" onclick="closePlaylistModal()">Cancel</button>
                    <button class="btn btn-primary" onclick="savePlaylist()">Save Playlist</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Toast Notifications -->
    <div class="toast-container" id="toast-container"></div>

    <script>
        let playlistsCache = [];

        function showToast(message, type = "success") {
            const container = document.getElementById("toast-container");
            const toast = document.createElement("div");
            toast.className = `toast ${type}`;
            toast.innerHTML = `
                <span>${message}</span>
                <button class="toast-close" onclick="this.parentElement.remove()">&times;</button>
            `;
            container.appendChild(toast);
            setTimeout(() => {
                toast.style.opacity = '0';
                setTimeout(() => toast.remove(), 300);
            }, 4000);
        }

        function openPlaylistModal(id = null) {
            const modal = document.getElementById("playlist-modal");
            const title = document.getElementById("modal-title");
            const nameInput = document.getElementById("playlist-name");
            const idInput = document.getElementById("playlist-id");
            const tbody = document.getElementById("playlist-items-tbody");
            
            tbody.innerHTML = "";
            idInput.value = "";
            nameInput.value = "";
            
            if (id) {
                title.innerText = "Edit Playlist";
                idInput.value = id;
                const p = playlistsCache.find(x => x.id === id);
                if (p) {
                    nameInput.value = p.name;
                    p.items.forEach(item => {
                        addPlaylistItemRow(item.title, item.url);
                    });
                }
            } else {
                title.innerText = "Create Playlist";
                // Add two initial blank rows
                addPlaylistItemRow();
                addPlaylistItemRow();
            }
            
            modal.classList.add("active");
        }

        function closePlaylistModal() {
            document.getElementById("playlist-modal").classList.remove("active");
        }

        function addPlaylistItemRow(title = "", url = "") {
            const tbody = document.getElementById("playlist-items-tbody");
            const tr = document.createElement("tr");
            
            tr.innerHTML = `
                <td>
                    <input type="text" class="form-control item-title" style="padding: 0.4rem 0.8rem; font-size: 0.85rem;" placeholder="e.g. Chapter 1" value="${title}">
                </td>
                <td>
                    <input type="text" class="form-control item-url" style="padding: 0.4rem 0.8rem; font-size: 0.85rem; font-family: var(--font-mono)" placeholder="Paste URL..." value="${url}">
                </td>
                <td style="text-align: center;">
                    <div style="display: flex; gap: 0.25rem; justify-content: center;">
                        <button class="btn btn-secondary btn-sm" style="padding: 0.2rem 0.4rem;" onclick="moveRow(this, -1)">▲</button>
                        <button class="btn btn-secondary btn-sm" style="padding: 0.2rem 0.4rem;" onclick="moveRow(this, 1)">▼</button>
                        <button class="btn btn-danger btn-sm" style="padding: 0.2rem 0.4rem; background: var(--danger-color);" onclick="deleteRow(this)">&times;</button>
                    </div>
                </td>
            `;
            tbody.appendChild(tr);
        }

        function deleteRow(btn) {
            btn.closest("tr").remove();
        }

        function moveRow(btn, direction) {
            const tr = btn.closest("tr");
            if (direction === -1) {
                const prev = tr.previousElementSibling;
                if (prev) tr.parentNode.insertBefore(tr, prev);
            } else {
                const next = tr.nextElementSibling;
                if (next) tr.parentNode.insertBefore(next, tr);
            }
        }

        async function loadPlaylists() {
            try {
                const response = await fetch("/api/playlists");
                const playlists = await response.json();
                playlistsCache = playlists;
                
                const grid = document.getElementById("playlists-grid");
                
                if (playlists.length === 0) {
                    grid.innerHTML = `
                        <div style="grid-column: 1/-1; text-align: center; color: var(--text-secondary); padding: 4rem;">
                            No playlists created yet. Set up a play queue to group videos together.
                        </div>
                    `;
                    return;
                }
                
                grid.innerHTML = "";
                playlists.forEach(p => {
                    const card = document.createElement("div");
                    card.className = "card";
                    card.style.marginBottom = "0";
                    
                    let itemsPreview = "";
                    p.items.slice(0, 3).forEach(item => {
                        itemsPreview += `
                            <div style="display: flex; justify-content: space-between; font-size: 0.85rem; border-bottom: 1px solid rgba(255,255,255,0.03); padding: 0.4rem 0;">
                                <span style="font-weight: 500; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 70%;">${item.title}</span>
                                <span class="video-url" style="max-width: 25%; font-size: 0.7rem;">${item.url}</span>
                            </div>
                        `;
                    });
                    if (p.items.length > 3) {
                        itemsPreview += `<div style="text-align: center; font-size: 0.75rem; color: var(--text-secondary); margin-top: 0.5rem;">+ ${p.items.length - 3} more items</div>`;
                    }
                    if (p.items.length === 0) {
                        itemsPreview = `<span style="color: var(--text-secondary); font-size: 0.85rem;">Playlist is empty.</span>`;
                    }
                    
                    card.innerHTML = `
                        <div class="card-title">
                            <span>${p.name}</span>
                            <span class="video-badge youtube">${p.items.length} Videos</span>
                        </div>
                        <div style="display: flex; flex-direction: column; gap: 0.25rem; margin-bottom: 1.5rem;">
                            ${itemsPreview}
                        </div>
                        <div style="display: flex; gap: 0.5rem; border-top: 1px solid var(--glass-border); padding-top: 1rem; margin-top: auto;">
                            <button class="btn btn-secondary btn-sm" style="flex-grow: 1;" onclick="openPlaylistModal('${p.id}')">Edit</button>
                            <button class="btn btn-danger btn-sm" onclick="deletePlaylist('${p.id}')">Delete</button>
                        </div>
                    `;
                    grid.appendChild(card);
                });
            } catch (err) {
                console.error("Error loading playlists:", err);
            }
        }

        async function savePlaylist() {
            const name = document.getElementById("playlist-name").value.trim();
            const id = document.getElementById("playlist-id").value;
            const tbody = document.getElementById("playlist-items-tbody");
            
            if (!name) {
                showToast("Please enter a playlist name.", "danger");
                return;
            }
            
            // Gather items
            const items = [];
            const rows = tbody.querySelectorAll("tr");
            rows.forEach(tr => {
                const title = tr.querySelector(".item-title").value.trim();
                const url = tr.querySelector(".item-url").value.trim();
                if (url) { // Must have at least a URL
                    items.push({
                        title: title || "Video Item",
                        url: url
                    });
                }
            });
            
            try {
                const response = await fetch("/api/playlists", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ id: id || null, name, items })
                });
                const data = await response.json();
                
                if (data.success) {
                    showToast(id ? "Playlist updated successfully!" : "Playlist created!");
                    closePlaylistModal();
                    loadPlaylists();
                } else {
                    showToast(`Failed: ${data.error}`, "danger");
                }
            } catch (err) {
                showToast("Error saving playlist.", "danger");
            }
        }

        async function deletePlaylist(id) {
            if (!confirm("Are you sure you want to delete this playlist?")) return;
            try {
                const response = await fetch(`/api/playlists/${id}`, { method: "DELETE" });
                const data = await response.json();
                if (data.success) {
                    showToast("Playlist deleted successfully.");
                    loadPlaylists();
                } else {
                    showToast("Failed to delete playlist.", "danger");
                }
            } catch (err) {
                showToast("Error deleting playlist.", "danger");
            }
        }

        // Initialize lists
        loadPlaylists();
    </script>
</body>
</html>
