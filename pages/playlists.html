<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stoud v3 - Playlist Builder</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <div class="bg-glow"></div>
    <div class="bg-glow-secondary"></div>

    <!-- Sidebar Navigation -->
    <div class="sidebar">
        <div class="logo-container">
            <div class="logo-icon">
                <svg viewBox="0 0 24 24">
                    <polygon points="23 7 16 12 23 17 23 7"></polygon>
                    <rect x="1" y="5" width="15" height="14" rx="2" ry="2"></rect>
                </svg>
            </div>
            <div class="logo-text">Stoud v3</div>
        </div>
        <ul class="nav-menu">
            <li class="nav-item">
                <a href="/">
                    <svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="9"></rect><rect x="14" y="3" width="7" height="5"></rect><rect x="14" y="12" width="7" height="9"></rect><rect x="3" y="16" width="7" height="5"></rect></svg>
                    Dashboard
                </a>
            </li>
            <li class="nav-item">
                <a href="/scheduled">
                    <svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg>
                    Schedules
                </a>
            </li>
            <li class="nav-item active">
                <a href="/playlists">
                    <svg viewBox="0 0 24 24"><line x1="8" y1="6" x2="21" y2="6"></line><line x1="8" y1="12" x2="21" y2="12"></line><line x1="8" y1="18" x2="21" y2="18"></line><line x1="3" y1="6" x2="3.01" y2="6"></line><line x1="3" y1="12" x2="3.01" y2="12"></line><line x1="3" y1="18" x2="3.01" y2="18"></line></svg>
                    Playlists
                </a>
            </li>
            <li class="nav-item">
                <a href="/saved">
                    <svg viewBox="0 0 24 24"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"></path></svg>
                    Library
                </a>
            </li>
            <li class="nav-item">
                <a href="/settings">
                    <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
                    Settings
                </a>
            </li>
        </ul>
        <div class="sidebar-footer">
            Stoud v3.0.0
        </div>
    </div>

    <!-- Main Content Area -->
    <div class="content-wrapper">
        <div class="header">
            <div class="page-title">
                <h1>Playlists Builder</h1>
                <p>Compile and sequence streams together into playing queues.</p>
            </div>
            <button class="btn btn-primary" onclick="openPlaylistModal()">
                <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
                Create Playlist
            </button>
        </div>

        <!-- Playlist Grid View -->
        <div class="grid" id="playlists-grid">
            <div style="grid-column: 1/-1; text-align: center; color: var(--text-secondary); padding: 3rem;">
                Loading playlists...
            </div>
        </div>
    </div>

    <!-- Edit/Add Playlist Modal -->
    <div class="modal" id="playlist-modal">
        <div class="modal-content" style="max-width: 750px;">
            <div class="modal-header">
                <h2 id="modal-title">Create Playlist</h2>
                <button class="modal-close" onclick="closePlaylistModal()">&times;</button>
            </div>
            <div style="display: flex; flex-direction: column; gap: 1rem;">
                <input type="hidden" id="playlist-id">
                
                <div class="form-group">
                    <label for="playlist-name">Playlist Name / Label</label>
                    <input type="text" id="playlist-name" class="form-control" placeholder="e.g. Daily Stream Series">
                </div>

                <div class="form-group">
                    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.5rem;">
                        <label>Playlist Items Queue</label>
                        <button class="btn btn-secondary btn-sm" onclick="addPlaylistItemRow()">
                            <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
                            Add Video Row
                        </button>
                    </div>
                    
                    <div style="max-height: 300px; overflow-y: auto; border: 1px solid var(--glass-border); border-radius: 10px; background: rgba(0,0,0,0.25);">
                        <table class="data-table" style="margin-top: 0;">
                            <thead>
                                <tr>
                                    <th style="width: 35%">Item Title</th>
                                    <th style="width: 45%">Video Link (YT / GDrive)</th>
                                    <th style="width: 20%; text-align: center;">Controls</th>
                                </tr>
                            </thead>
                            <tbody id="playlist-items-tbody">
                                <!-- Appended rows -->
                            </tbody>
                        </table>
                    </div>
                </div>

                <div class="form-row" style="margin-top: 1rem;">
                    <button class="btn btn-secondary" onclick="closePlaylistModal()">Cancel</button>
                    <button class="btn btn-primary" onclick="savePlaylist()">Save Playlist</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Toast Notifications -->
    <div class="toast-container" id="toast-container"></div>

    <script src="/js/playlists.js"></script>
</body>
</html>
