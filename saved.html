<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stoud v2 - Saved Videos Library</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="bg-glow"></div>
    <div class="bg-glow-secondary"></div>

    <!-- Sidebar Navigation -->
    <div class="sidebar">
        <div class="logo-container">
            <div class="logo-icon">
                <svg viewBox="0 0 24 24">
                    <polygon points="23 7 16 12 23 17 23 7"></polygon>
                    <rect x="1" y="5" width="15" height="14" rx="2" ry="2"></rect>
                </svg>
            </div>
            <div class="logo-text">Stoud v2</div>
        </div>
        <ul class="nav-menu">
            <li class="nav-item">
                <a href="/">
                    <svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="9"></rect><rect x="14" y="3" width="7" height="5"></rect><rect x="14" y="12" width="7" height="9"></rect><rect x="3" y="16" width="7" height="5"></rect></svg>
                    Dashboard
                </a>
            </li>
            <li class="nav-item">
                <a href="/scheduled">
                    <svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg>
                    Schedules
                </a>
            </li>
            <li class="nav-item">
                <a href="/playlists">
                    <svg viewBox="0 0 24 24"><line x1="8" y1="6" x2="21" y2="6"></line><line x1="8" y1="12" x2="21" y2="12"></line><line x1="8" y1="18" x2="21" y2="18"></line><line x1="3" y1="6" x2="3.01" y2="6"></line><line x1="3" y1="12" x2="3.01" y2="12"></line><line x1="3" y1="18" x2="3.01" y2="18"></line></svg>
                    Playlists
                </a>
            </li>
            <li class="nav-item active">
                <a href="/saved">
                    <svg viewBox="0 0 24 24"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"></path></svg>
                    Library
                </a>
            </li>
            <li class="nav-item">
                <a href="/settings">
                    <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
                    Settings
                </a>
            </li>
        </ul>
        <div class="sidebar-footer">
            Stoud v2.0.0
        </div>
    </div>

    <!-- Main Content Area -->
    <div class="content-wrapper">
        <div class="header">
            <div class="page-title">
                <h1>Video Library</h1>
                <p>Bookmark video links for quick, one-click broadcasting without typing links again.</p>
            </div>
            <button class="btn btn-primary" onclick="openSaveModal()">
                <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
                Bookmark Video
            </button>
        </div>

        <!-- Saved Videos Grid View -->
        <div class="grid" id="saved-grid">
            <!-- Dynamic listing -->
            <div style="grid-column: 1/-1; text-align: center; color: var(--text-secondary); padding: 3rem;">
                Loading library bookmarks...
            </div>
        </div>
    </div>

    <!-- Bookmark Modal -->
    <div class="modal" id="save-modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Bookmark Video</h2>
                <button class="modal-close" onclick="closeSaveModal()">&times;</button>
            </div>
            <div style="display: flex; flex-direction: column; gap: 1rem;">
                <div class="form-group">
                    <label for="save-title">Video Title / Name</label>
                    <input type="text" id="save-title" class="form-control" placeholder="e.g. Big Buck Bunny Movie">
                </div>

                <div class="form-group">
                    <label for="save-url">Video Stream Link (YouTube / GDrive / MP4)</label>
                    <input type="text" id="save-url" class="form-control" placeholder="https://...">
                </div>

                <div class="form-row" style="margin-top: 1rem;">
                    <button class="btn btn-secondary" onclick="closeSaveModal()">Cancel</button>
                    <button class="btn btn-primary" onclick="saveVideo()">Bookmark</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Toast Notifications -->
    <div class="toast-container" id="toast-container"></div>

    <script>
        function showToast(message, type = "success") {
            const container = document.getElementById("toast-container");
            const toast = document.createElement("div");
            toast.className = `toast ${type}`;
            toast.innerHTML = `
                <span>${message}</span>
                <button class="toast-close" onclick="this.parentElement.remove()">&times;</button>
            `;
            container.appendChild(toast);
            setTimeout(() => {
                toast.style.opacity = '0';
                setTimeout(() => toast.remove(), 300);
            }, 4000);
        }

        function openSaveModal() {
            document.getElementById("save-modal").classList.add("active");
        }

        function closeSaveModal() {
            document.getElementById("save-modal").classList.remove("active");
            document.getElementById("save-title").value = "";
            document.getElementById("save-url").value = "";
        }

        async function loadSavedVideos() {
            try {
                const response = await fetch("/api/saved");
                const videos = await response.json();
                
                const grid = document.getElementById("saved-grid");
                
                if (videos.length === 0) {
                    grid.innerHTML = `
                        <div style="grid-column: 1/-1; text-align: center; color: var(--text-secondary); padding: 4rem;">
                            Your video library is empty. Bookmark links to start streaming them instantly!
                        </div>
                    `;
                    return;
                }
                
                grid.innerHTML = "";
                videos.forEach(v => {
                    const card = document.createElement("div");
                    card.className = "video-item";
                    
                    let badgeClass = "direct";
                    let badgeLabel = "Direct Link";
                    if (v.type === "youtube") {
                        badgeClass = "youtube";
                        badgeLabel = "YouTube";
                    } else if (v.type === "gdrive") {
                        badgeClass = "gdrive";
                        badgeLabel = "Google Drive";
                    }
                    
                    card.innerHTML = `
                        <div style="display: flex; justify-content: space-between; align-items: flex-start; gap: 0.5rem;">
                            <div class="video-title">${v.title}</div>
                            <span class="video-badge ${badgeClass}">${badgeLabel}</span>
                        </div>
                        <div class="video-url">${v.url}</div>
                        <div class="video-meta">
                            <button class="btn btn-primary btn-sm" onclick="playVideo('${v.url}')">
                                <svg width="12" height="12" fill="currentColor" viewBox="0 0 24 24"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg>
                                Stream Now
                            </button>
                            <button class="btn btn-secondary btn-sm" style="background: rgba(239, 68, 68, 0.1); border-color: rgba(239, 68, 68, 0.2); color: #f87171;" onclick="deleteVideo('${v.id}')">
                                Delete
                            </button>
                        </div>
                    `;
                    grid.appendChild(card);
                });
            } catch (err) {
                console.error("Error loading library:", err);
            }
        }

        async function saveVideo() {
            const title = document.getElementById("save-title").value.trim();
            const url = document.getElementById("save-url").value.trim();
            
            if (!title || !url) {
                showToast("Please enter both a title and a valid URL.", "danger");
                return;
            }
            
            try {
                const response = await fetch("/api/saved", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ title, url })
                });
                const data = await response.json();
                
                if (data.success) {
                    showToast("Video bookmarked to library!");
                    closeSaveModal();
                    loadSavedVideos();
                } else {
                    showToast(`Failed: ${data.error}`, "danger");
                }
            } catch (err) {
                showToast("Error bookmarking video link.", "danger");
            }
        }

        async function playVideo(url) {
            showToast("Resolving library stream... starting broadcast.");
            try {
                const response = await fetch("/api/stream/start", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ url, quality: "copy" })
                });
                const data = await response.json();
                
                if (data.success) {
                    showToast("Stream started! Check Dashboard logs.");
                } else {
                    showToast(`Failed: ${data.error}`, "danger");
                }
            } catch (err) {
                showToast("Error initiating broadcast.", "danger");
            }
        }

        async function deleteVideo(id) {
            if (!confirm("Are you sure you want to remove this video bookmark?")) return;
            try {
                const response = await fetch(`/api/saved/${id}`, { method: "DELETE" });
                const data = await response.json();
                if (data.success) {
                    showToast("Video removed from library.");
                    loadSavedVideos();
                } else {
                    showToast("Failed to delete video.", "danger");
                }
            } catch (err) {
                showToast("Error deleting video.", "danger");
            }
        }

        // Initialize lists
        loadSavedVideos();
    </script>
</body>
</html>
